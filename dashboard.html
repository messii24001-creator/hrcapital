<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Capital</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="header">

    <div class="headerTop">

        <div>

            <h1>HR Capital</h1>

            <p>Rewards • Loyalty • Premium</p>

        </div>

        <div class="profileCircle">
            👤
        </div>

    </div>

    <div class="welcomeBox">

        <span>Welcome Back 👋</span>

        <h2 id="customerName">
            Loading...
        </h2>

    </div>

</div>

<div class="pointsCard">

    <div class="walletTop">

        <p class="small">
            💎 Total HR Points
        </p>

        <span class="liveBadge">
            ★ Active
        </span>

    </div>

    <h1 id="hrPoints">
        0 HR
    </h1>

    <p class="worth">
        Worth ₹<span id="hrValue">0</span>
    </p>

    <div class="walletInfo">

        <div class="infoBox">

            <p>🏆 Rank</p>

            <h2 id="rank">#0</h2>

        </div>

        <div class="infoBox">

            <p>🥉 Membership</p>

            <h2 id="member">Bronze</h2>

        </div>

    </div>

</div>

<div class="left">

<div class="grid">

<div class="card" id="historyBtn">

<div class="icon">📜</div>

<h3>Recharge History</h3>

</div>

<div class="card" id="leaderboardBtn">

<div class="icon">🏆</div>

<h3>Leaderboard</h3>

</div>

<div class="card" id="scratchBtn">

<div class="icon">🎁</div>

<h3>Scratch Card</h3>

</div>

<div class="card" id="expiryBtn">

<div class="icon">⏳</div>

<h3>HR Expiry</h3>

</div>

</div>
<div class="logoutBox">
    <button id="logoutBtn">Logout</button>
</div>
<script type="module" src="Js/dashboard.js"></script>

</body>
</html>
