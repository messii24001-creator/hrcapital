<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Capital Login</title>

<link rel="stylesheet" href="css/style.css">

<!-- Google Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="login-container">

    <!-- Logo -->

    <div class="logoBox">

        <div class="logoCircle">
            👑
        </div>

        <h1>HR Capital</h1>

        <p>Rewards • Loyalty • Premium</p>

    </div>

    <!-- Login Card -->

    <div class="loginCard">

        <h2>Welcome Back</h2>

        <p class="subText">
            Login to continue
        </p>

        <!-- Mobile -->

        <div class="inputBox">

            <span class="material-icons">
                phone
            </span>

            <input
                type="tel"
                id="mobile"
                placeholder="Mobile Number"
                maxlength="10"
            >

        </div>

        <!-- Password -->

        <div class="inputBox">

            <span class="material-icons">
                lock
            </span>

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

        </div>

        <!-- Login -->

        <button id="loginBtn">
           <span id="loginText">🚀 Login Securely</span>
            </button>

        <!-- Admin -->

        <p id="adminOpen">Administrator Access</p>

    </div>

    <!-- Footer -->

    <div class="footer">

        © 2026 HR Capital Rewards Program

    </div>

</div>

<script type="module" src="Js/login.js"></script>

</body>
</html>
