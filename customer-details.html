<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Details</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="container">

<h1>Customer Details</h1>

<div class="card">

<input
type="text"
id="searchMobile"
placeholder="🔍 Enter Mobile Number">

<button id="searchBtn">
Search Customer
</button>

</div>

<div class="card">

<p class="info"><b>Name:</b> <span id="name">-</span></p>

<p class="info"><b>Mobile:</b> <span id="mobile">-</span></p>

<p class="info"><b>HR Points:</b> <span id="hrpoint">-</span></p>

<p class="info"><b>Rank:</b> <span id="rank">-</span></p>

<p class="info"><b>Status:</b> <span id="status">-</span></p>

<br>

<button id="editBtn">
✏ Edit HR
</button>

<br><br>

<button
id="deleteBtn"
style="background:#DC2626;">
🗑 Delete Customer
</button>

</div>

<script type="module" src="Js/customer-details.js"></script>

</div>

</body>
</html>
